name: Build WinUI

on:
  push:
    branches: [master, dev]
    paths:
      - 'AwqatSalaat.WinUI/**'
      - 'AwqatSalaat.WinUI.Package/**'
      - 'AwqatSalaat.Common/**'
      - '.github/workflows/build-winui.yml'
  pull_request:
    paths:
      - 'AwqatSalaat.WinUI/**'
      - 'AwqatSalaat.WinUI.Package/**'
      - 'AwqatSalaat.Common/**'
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release
      platform:
        description: 'Target platform'
        required: true
        default: 'x64'
        type: choice
        options:
          - x64
          - x86
          - ARM64

jobs:
  build:
    runs-on: windows-latest

    env:
      Configuration: ${{ github.event.inputs.configuration || 'Debug' }}
      Platform: ${{ github.event.inputs.platform || 'x64' }}
      Project: AwqatSalaat.WinUI.Package\AwqatSalaat.WinUI.Package.wixproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 6 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: msbuild $env:Project /t:Restore /p:Configuration=$env:Configuration /p:Platform=$env:Platform

      - name: Build app (produces the assembly WiX harvests)
        run: msbuild AwqatSalaat.WinUI\AwqatSalaat.WinUI.csproj /t:Build /p:Configuration=$env:Configuration /p:Platform=$env:Platform /p:RestorePackages=false

      - name: Build MSI installer
        run: msbuild $env:Project /t:Build /p:Configuration=$env:Configuration /p:Platform=$env:Platform /p:RestorePackages=false

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: AwqatSalaat-WinUI-${{ env.Platform }}-${{ env.Configuration }}-msi
          path: AwqatSalaat.WinUI.Package/bin/**/*.msi
          if-no-files-found: error
          retention-days: 14

      - name: Publish app (portable, self-contained)
        run: msbuild AwqatSalaat.WinUI\AwqatSalaat.WinUI.csproj /t:Publish /p:Configuration=$env:Configuration /p:Platform=$env:Platform /p:PublishDir=publish/ /p:RestorePackages=false

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: AwqatSalaat-WinUI-${{ env.Platform }}-${{ env.Configuration }}-portable
          path: AwqatSalaat.WinUI/publish/**
          if-no-files-found: error
          retention-days: 14
